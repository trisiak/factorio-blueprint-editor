name: CI

# Quality gates for the JS workspaces: lint, format, unit tests, type-check, and
# e2e. Runs on every PR and on pushes to master. (The exporter is Rust and out of
# scope here.)

on:
  pull_request:
  push:
    branches:
      - master

# Supersede in-flight runs for the same ref/PR.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - run: npm install --legacy-peer-deps
      - run: npm run lint

  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - run: npm install --legacy-peer-deps
      - run: npm test

  type-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - run: npm install --legacy-peer-deps
      - run: npm run type-check

  format:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - run: npm install --legacy-peer-deps
      - run: npm run format

  e2e:
    runs-on: ubuntu-latest
    # Spread the suite across concurrent runners with Playwright's native
    # sharding (test-count balanced across both projects). Each shard still runs
    # single-worker (see playwright.config: GPU-less SwiftShader rendering can't
    # take two canvas workers per runner) — sharding is the cross-runner
    # parallelism, `workers: 1` is the per-runner stability. fail-fast: false so
    # one red shard doesn't cancel the others. Bump shardTotal (and the index
    # list) together to add runners.
    strategy:
      fail-fast: false
      matrix:
        shardIndex: [1, 2, 3]
        shardTotal: [3]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - run: npm install --legacy-peer-deps
      # Browser + OS deps for the Playwright chromium projects. The webServer in
      # playwright.config builds the site and serves it on :8080 automatically.
      - run: npx playwright install --with-deps chromium
      - run: npm run test:e2e -- --shard=${{ matrix.shardIndex }}/${{ matrix.shardTotal }}
