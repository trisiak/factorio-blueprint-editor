name: PR preview

# Builds a slim per-PR preview (no atlas — it reuses the production deploy's via
# VITE_DATA_URL) and publishes it to `pr-preview/pr-<N>/` on the `gh-pages`
# branch, then comments the URL on the PR. On close, the preview is removed.

on:
  pull_request:
    types: [opened, synchronize, reopened, closed]

concurrency:
  group: gh-pages-deploy
  cancel-in-progress: false

permissions:
  contents: write
  pull-requests: write

jobs:
  preview:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        if: github.event.action != 'closed'
        with:
          node-version: 22

      - run: npm install --legacy-peer-deps
        if: github.event.action != 'closed'

      - run: npm run build:website
        if: github.event.action != 'closed'
        env:
          PUBLIC_BASE: /factorio-blueprint-editor/pr-preview/pr-${{ github.event.number }}/
          # NOTE: This branch introduces the per-pack data layout
          # (data/<pack>/data.json + atlas) and the Space Age dump. The
          # production deploy still serves the OLD single-dump layout
          # (/data/data.json), so the usual VITE_DATA_URL=/…/data +
          # SKIP_DATA_COPY trick would load stale data with new code (or 404 on
          # /data/<pack>/data.json). Bundle this PR's own data instead so the
          # preview renders Space Age correctly. Once this merges and prod is
          # pack-aware, this can revert to reusing the prod atlas.

      - name: Deploy / remove preview
        uses: rossjrw/pr-preview-action@v1
        with:
          source-dir: packages/website/dist
          umbrella-dir: pr-preview
